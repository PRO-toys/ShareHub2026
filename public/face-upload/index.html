<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Face Search — Multi-Snap Booth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(165deg, #FAFAF8, #F5F0E6);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      color: #1A1A1A;
    }
    .brand {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.3em;
      text-transform: uppercase; color: #C9A24A; margin-bottom: 0.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 300; margin-bottom: 1rem; }
    .card {
      width: 100%; max-width: 400px;
      background: white; border-radius: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .camera-box {
      position: relative; width: 100%; aspect-ratio: 3/4;
      background: #111; display: flex; align-items: center; justify-content: center;
    }
    .camera-box video {
      width: 100%; height: 100%; object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }
    .camera-box canvas { display: none; }
    .camera-box .overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .face-guide {
      width: 55%; aspect-ratio: 3/4;
      border: 2px dashed rgba(201,162,74,0.5); border-radius: 50%;
    }
    .controls { padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .btn {
      width: 100%; padding: 0.85rem;
      border: none; border-radius: 0.75rem; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #C9A24A, #D4B366);
      color: white; box-shadow: 0 2px 8px rgba(201,162,74,0.3);
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #F3F4F6; color: #4B5563;
    }
    .status {
      text-align: center; font-size: 0.8rem; color: #6B7280;
      min-height: 1.5rem; display: flex; align-items: center;
      justify-content: center; gap: 0.5rem;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid #E5E7EB;
      border-top-color: #C9A24A; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result { padding: 1.5rem; text-align: center; }
    .result .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .result h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.25rem; }
    .result p { font-size: 0.8rem; color: #6B7280; }
  </style>
</head>
<body>
  <p class="brand">Multi-Snap Booth</p>
  <h1>Find Your Photos</h1>

  <div class="card" id="cameraCard">
    <div class="camera-box">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="overlay"><div class="face-guide"></div></div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="snapBtn" onclick="snapAndSearch()">
        Take Selfie & Search
      </button>
      <div class="status" id="status">Position your face in the circle</div>
    </div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div class="result" id="resultContent"></div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="retry()">Try Again</button>
    </div>
  </div>

  <script>
    // Parse URL params
    var params = new URLSearchParams(location.search);
    var TOKEN = params.get('token') || '';
    var EVENT_ID = params.get('eventId') || '';
    var BASE = location.protocol + '//' + location.host;

    var video = document.getElementById('video');
    var canvas = document.getElementById('canvas');
    var statusEl = document.getElementById('status');
    var snapBtn = document.getElementById('snapBtn');
    var stream = null;

    // Start camera
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        video.srcObject = stream;
      } catch (e) {
        statusEl.textContent = 'Camera access denied';
        snapBtn.disabled = true;
      }
    }

    async function snapAndSearch() {
      if (!stream) return;
      snapBtn.disabled = true;
      statusEl.innerHTML = '<div class="spinner"></div> Searching...';

      // Capture frame
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      var ctx = canvas.getContext('2d');
      // Mirror (match video display)
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);
      var imageBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

      // Stop camera
      stream.getTracks().forEach(function(t) { t.stop(); });
      stream = null;

      try {
        var r = await fetch(BASE + '/api/face/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN, eventId: EVENT_ID, imageBase64: imageBase64 })
        });
        var data = await r.json();
        if (data.success && data.data && data.data.matches > 0) {
          showResult('success', data.data.matches + ' photo' + (data.data.matches > 1 ? 's' : '') + ' found!',
            'Results are displayed on the viewer screen');
        } else if (data.success && data.data && data.data.matches === 0) {
          showResult('empty', 'No matches found', 'Try again with better lighting');
        } else {
          showResult('error', 'Search failed', data.error || 'Please try again');
        }
      } catch (e) {
        showResult('error', 'Connection error', 'Make sure you are on the event WiFi');
      }
    }

    function showResult(type, title, subtitle) {
      document.getElementById('cameraCard').style.display = 'none';
      document.getElementById('resultCard').style.display = 'block';
      var icons = { success: '✅', empty: '😔', error: '⚠️' };
      document.getElementById('resultContent').innerHTML =
        '<div class="icon">' + (icons[type] || '📷') + '</div>' +
        '<h2>' + title + '</h2>' +
        '<p>' + subtitle + '</p>';
    }

    function retry() {
      document.getElementById('cameraCard').style.display = 'block';
      document.getElementById('resultCard').style.display = 'none';
      snapBtn.disabled = false;
      statusEl.textContent = 'Position your face in the circle';
      startCamera();
    }

    startCamera();
  </script>
</body>
</html>
