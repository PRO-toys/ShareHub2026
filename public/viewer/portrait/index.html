// ── QR Panel ──
async function loadQr(session) {
  resetQrPanel();
  if (!session) return;
  document.getElementById('qrLoading').style.display = 'flex';
  try {
    var r = await fetch(BASE + '/api/delivery/qr', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: session.id, filePath: session.rendered_image_path }),
    });
    if (!r.ok) throw new Error('QR API error');
    var j = await r.json();
    var url = (j.data || j).qrImageUrl;
    if (!url) throw new Error('No QR URL');
    S.downloadUrl = (j.data || j).downloadUrl || null;
    var copyBtn = document.getElementById('copyLinkBtn');
    if (copyBtn) copyBtn.disabled = !S.downloadUrl;
    var img = document.getElementById('qrImg');
    img.onload  = function() { document.getElementById('qrLoading').style.display = 'none'; img.style.display = 'block'; document.getElementById('qrPlaceholder').style.display = 'none'; };
    img.onerror = function() { resetQrPanel(); };
    img.src = url;
  } catch(e) { resetQrPanel(); }
}

function resetQrPanel() {
  document.getElementById('qrLoading').style.display = 'none';
  document.getElementById('qrImg').style.display = 'none';
  document.getElementById('qrImg').src = '';
  document.getElementById('qrPlaceholder').style.display = 'flex';
  S.downloadUrl = null;
  var copyBtn = document.getElementById('copyLinkBtn');
  if (copyBtn) copyBtn.disabled = true;
}

function copyDownloadLink() {
  var url = S.downloadUrl;
  if (!url) { toast('ไม่มีลิงก์', 'err'); return; }
  var btn = document.getElementById('copyLinkBtn');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function() {
      toast('คัดลอกลิงก์แล้ว!', 'ok');
      if (btn) { var orig = btn.innerHTML; btn.innerHTML = '✓ Copied!'; setTimeout(function() { btn.innerHTML = orig; }, 1500); }
    }).catch(function() { fallbackCopy(url, btn); });
  } else {
    fallbackCopy(url, btn);
  }
}

function fallbackCopy(text, btn) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    toast('คัดลอกลิงก์แล้ว!', 'ok');
    if (btn) { var orig = btn.innerHTML; btn.innerHTML = '✓ Copied!'; setTimeout(function() { btn.innerHTML = orig; }, 1500); }
  } catch(e) { toast('Copy failed — ' + text, 'inf'); }
  document.body.removeChild(ta);
}

// ── Print ──
async function printCurrent() {
  if (S.printing || S.idx < 0) return;
  var s = S.filtered[S.idx];
  if (!s) return;
  S.printing = true;
  var btn = document.getElementById('printBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="print-spin"></div>';
  try {
    var printers = [];
    try { var pr = await fetch(BASE + '/api/delivery/printers'); if (pr.ok) printers = await pr.json(); } catch(e){}
    var printerName = null;
    if (printers.length === 1) printerName = printers[0].name || printers[0];
    else if (printers.length > 1) {
      var choice = prompt('Select printer:\n' + printers.map(function(p,i){ return i + ': ' + (p.name||p); }).join('\n'));
      if (choice === null) { S.printing = false; btn.disabled = false; btn.innerHTML = '<span id="printLabel">Print</span>'; return; }
      var n = parseInt(choice, 10);
      printerName = (!isNaN(n) && printers[n]) ? (printers[n].name || printers[n]) : choice;
    }
    if (!printerName) { toast('No printer available', 'err'); return; }
    var res = await fetch(BASE + '/api/delivery/print', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: s.rendered_image_path, printerName: printerName, copies: 1 }),
    });
    var data = await res.json();
    res.ok ? toast('Sent to ' + printerName, 'ok') : toast(data.error || 'Print failed', 'err');
  } catch(e) { toast('Print failed', 'err'); }
  finally {
    S.printing = false; btn.disabled = false;
    btn.innerHTML = '<span id="printLabel">Print</span>';
  }
}

// ── Thumbnails ──
function renderThumbs(sessions) {
  var strip = document.getElementById('thumbStrip');
  if (!sessions.length) { strip.innerHTML = '<div class="th-empty">No photos</div>'; updateThumbArrows(); return; }
  var html = '';
  sessions.forEach(function(s, i) {
    var url = s.thumb_url ? BASE + s.thumb_url : BASE + '/api/photo-preview?path=' + encodeURIComponent(s.rendered_image_path);
    var active = i === 0 ? ' active' : '';
    html += '<div class="thumb' + active + '" onclick="selectItem(' + i + ')" data-i="' + i + '">'
          + '<img src="' + url + '" alt="" loading="lazy" /></div>';
  });
  strip.innerHTML = html;
  setTimeout(updateThumbArrows, 80);
}

function highlightThumb(idx) {
  var thumbs = document.querySelectorAll('.thumb');
  thumbs.forEach(function(t, i) { t.classList.toggle('active', i === idx); t.classList.remove('highlight'); });
  var active = thumbs[idx];
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function highlightThumbById(sessionId) {
  var found = -1;
  S.filtered.forEach(function(s, i) { if (s.id === sessionId) found = i; });
  if (found >= 0) {
    selectItem(found);
    setTimeout(function() {
      var t = document.querySelectorAll('.thumb')[found];
      if (t) { t.classList.add('highlight'); setTimeout(function(){ t.classList.remove('highlight'); }, 1800); }
    }, 100);
    return true;
  }
  return false;
}

function scrollThumbs(dir) {
  var strip = document.getElementById('thumbStrip');
  strip.scrollBy({ left: dir * strip.clientWidth * 0.65, behavior: 'smooth' });
  setTimeout(updateThumbArrows, 350);
}

function updateThumbArrows() {
  var strip = document.getElementById('thumbStrip');
  var L = document.getElementById('thScrollL'), R = document.getElementById('thScrollR');
  if (!strip) return;
  L.disabled = strip.scrollLeft <= 0;
  R.disabled = strip.scrollLeft + strip.clientWidth >= strip.scrollWidth - 2;
}

// ── QR Scan ──
function toggleQrScan() {
  var modal = document.getElementById('qrModal');
  modal.classList.contains('open') ? stopQrScan() : startQrScan();
}

async function startQrScan() {
  try {
    S.qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('qrVid').srcObject = S.qrStream;
    document.getElementById('qrModal').classList.add('open');
    var btn = document.getElementById('scanBtn');
    if (btn) { btn.style.background = '#ef4444'; btn.style.color = '#fff'; btn.textContent = '⏹'; }
    scanFrame();
  } catch(e) { toast('Camera access denied', 'err'); }
}

function stopQrScan() {
  if (S.qrAnim) { cancelAnimationFrame(S.qrAnim); S.qrAnim = null; }
  if (S.qrStream) { S.qrStream.getTracks().forEach(function(t){ t.stop(); }); S.qrStream = null; }
  document.getElementById('qrModal').classList.remove('open');
  var btn = document.getElementById('scanBtn');
  if (btn) { btn.style.background = '#f0f0f0'; btn.style.color = '#555'; btn.textContent = '📷'; }
}

function scanFrame() {
  var vid = document.getElementById('qrVid');
  if (!S.qrStream) return;
  if (vid.readyState === vid.HAVE_ENOUGH_DATA && typeof jsQR !== 'undefined') {
    var c = document.createElement('canvas');
    c.width = vid.videoWidth; c.height = vid.videoHeight;
    c.getContext('2d').drawImage(vid, 0, 0);
    var d = c.getContext('2d').getImageData(0, 0, c.width, c.height);
    var code = jsQR(d.data, d.width, d.height);
    if (code && code.data) { handleQrResult(code.data); return; }
  }
  S.qrAnim = requestAnimationFrame(scanFrame);
}

async function handleQrResult(url) {
  stopQrScan();
  var m = url.match(/\/download\/([^/?#]+)/) || url.match(/\/qr\/([^/?#.]+)/);
  var token = m ? m[1] : null;
  if (!token) { toast('QR not recognized', 'err'); return; }
  try {
    var r = await fetch(BASE + '/api/delivery/page/' + token);
    if (!r.ok) { toast('Session not found for this QR', 'err'); return; }
    var j = await r.json();
    var sid = j.sessionId || (j.data && j.data.sessionId);
    if (!sid) { toast('Cannot resolve session from QR', 'err'); return; }
    if (highlightThumbById(sid)) { toast('Session found!', 'ok'); return; }
    var inAll = S.all.find(function(s){ return s.id === sid; });
    if (inAll) { applySearch(); setTimeout(function(){ highlightThumbById(sid); }, 120); toast('Session found', 'ok'); }
    else { toast('Session not found in this event', 'err'); }
  } catch(e) { toast('QR lookup failed', 'err'); }
}

// ── Utils ──
// ── Resizable thumbnail strip ──
// ── Thumbnail drag-to-scroll ──
function initThumbDrag() {
  var strip = document.getElementById('thumbStrip');
  if (!strip) return;
  var dragging = false, startX = 0, scrollStart = 0, moved = false;
  strip.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    dragging = true; moved = false;
    startX = e.clientX;
    scrollStart = strip.scrollLeft;
    strip.classList.add('dragging');
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dx = e.clientX - startX;
    if (Math.abs(dx) > 3) moved = true;
    strip.scrollLeft = scrollStart - dx;
  });
  document.addEventListener('mouseup', function(e) {
    if (!dragging) return;
    dragging = false;
    strip.classList.remove('dragging');
    // If drag was significant, block the click on the thumb
    if (moved) { e.stopPropagation(); setTimeout(function(){ moved = false; }, 50); }
    setTimeout(updateThumbArrows, 80);
  });
  // Prevent click-select on thumbs after drag
  strip.addEventListener('click', function(e) {
    if (moved) { e.stopPropagation(); e.preventDefault(); }
  }, true);
}

function initResizable() {
  // ── mvHandle: portrait — resize rightPanel height, masterView fills rest ──
  var mvHnd = document.getElementById('mvHandle');
  var rpPortrait = document.getElementById('rightPanel');
  if (mvHnd && rpPortrait) {
    var mvDragging = false, mvStartY = 0, mvStartH = 0;
    function mvDown(e) {
      mvDragging = true;
      mvStartY = (e.touches ? e.touches[0].clientY : e.clientY) || 0;
      mvStartH = rpPortrait.offsetHeight;
      mvHnd.classList.add('dragging');
      document.body.style.cursor = 'ns-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    }
    function mvMove(e) {
      if (!mvDragging) return;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) || 0;
      var dy = mvStartY - y; // drag up = rightPanel bigger
      var newH = Math.min(800, Math.max(80, mvStartH + dy));
      rpPortrait.style.height = newH + 'px';
      rpPortrait.style.flexShrink = '0';
    }
    function mvUp() {
      mvDragging = false;
      mvHnd.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
    mvHnd.addEventListener('mousedown', mvDown);
    mvHnd.addEventListener('touchstart', mvDown, { passive: false });
    document.addEventListener('mousemove', mvMove);
    document.addEventListener('touchmove', mvMove, { passive: false });
    document.addEventListener('mouseup', mvUp);
    document.addEventListener('touchend', mvUp);
  }

  // ── Vertical handle: resize rightPanel width ──
  var vHnd = document.getElementById('vHandle');
  var rp = document.getElementById('rightPanel');
  var mv = document.getElementById('masterView');
  if (vHnd && rp) {
    var vDragging = false, vStartX = 0, vStartW = 0;
    function vDown(e) {
      vDragging = true;
      vStartX = (e.touches ? e.touches[0].clientX : e.clientX) || 0;
      vStartW = rp.offsetWidth;
      vHnd.classList.add('dragging');
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    }
    function vMove(e) {
      if (!vDragging) return;
      var x = (e.touches ? e.touches[0].clientX : e.clientX) || 0;
      var dx = vStartX - x; // drag left = wider, drag right = narrower
      var newW = Math.min(400, Math.max(120, vStartW + dx));
      rp.style.width = newW + 'px';
      // In landscape mode masterView has fixed max-width — update it so it shrinks/expands
      if (mv && document.body.classList.contains('enforce-169')) {
        mv.style.maxWidth = 'calc(100% - ' + (newW + 38) + 'px)';
      }
    }
    function vUp() {
      vDragging = false;
      vHnd.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
    vHnd.addEventListener('mousedown', vDown);
    vHnd.addEventListener('touchstart', vDown, { passive: false });
    document.addEventListener('mousemove', vMove);
    document.addEventListener('touchmove', vMove, { passive: false });
    document.addEventListener('mouseup', vUp);
    document.addEventListener('touchend', vUp);
  }

  // ── Horizontal handle: resize thumbWrapper height ──
  var hHnd = document.getElementById('hHandle');
  var tw = document.getElementById('thumbWrapper');
  if (!hHnd || !tw) return;
  var dragging = false, startY = 0, startH = 0;
  function down(e) {
    dragging = true; startY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
    startH = tw.offsetHeight;
    hHnd.classList.add('dragging'); e.preventDefault();
  }
  function move(e) {
    if (!dragging) return;
    var y = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
    var dy = startY - y;
    var isPortrait = document.body.classList.contains('portrait');
    var maxH = isPortrait ? 300 : 350;
    var newH = Math.min(maxH, Math.max(44, startH + dy));
    document.documentElement.style.setProperty('--th-h', newH + 'px');
    tw.style.height = newH + 'px';
  }
  function up() { dragging = false; hHnd.classList.remove('dragging'); }
  hHnd.addEventListener('mousedown', down);
  hHnd.addEventListener('touchstart', down, { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
}

function esc(s) { var d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }
var _toastTimer = null;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type === 'ok' ? 'toast-ok' : type === 'err' ? 'toast-err' : 'toast-inf';
  el.style.opacity = '1';
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.style.opacity = '0'; }, 3000);
}
</script>
</body>
